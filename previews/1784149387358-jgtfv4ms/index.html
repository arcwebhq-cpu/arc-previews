  <title>siterise | Modern Website Templates for Business Owners</title>

  <style>
    :root {
      --red: #b51f2e;
      --red-dark: #851722;
      --red-light: #f9e9eb;
      --gold: #c59b3c;
      --gold-light: #f6edda;
      --green: #123f31;
      --green-mid: #1e5b47;
      --green-light: #e9f3ef;
      --ink: #101713;
      --muted: #5f6964;
      --cream: #fbfaf6;
      --white: #ffffff;
      --line: rgba(16, 23, 19, 0.12);
      --shadow-sm: 0 12px 35px rgba(16, 23, 19, 0.08);
      --shadow-lg: 0 28px 80px rgba(16, 23, 19, 0.16);
      --radius: 18px;
      --radius-lg: 30px;
      --max-width: 1180px;
      --header-height: 78px;
      --transition: 220ms ease;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-height) + 22px);
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--cream);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    body.menu-open {
      overflow: hidden;
    }

    ::selection {
      color: var(--white);
      background: var(--red);
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1,
    h2,
    h3 {
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    h1 {
      max-width: 820px;
      margin-bottom: 25px;
      font-size: clamp(3.2rem, 8vw, 6.8rem);
      font-weight: 800;
    }

    h2 {
      margin-bottom: 18px;
      font-size: clamp(2.25rem, 5vw, 4.35rem);
      font-weight: 780;
    }

    h3 {
      margin-bottom: 12px;
      font-size: clamp(1.28rem, 2vw, 1.65rem);
    }

    p {
      color: var(--muted);
    }

    section {
      position: relative;
      padding: 112px 0;
    }

    .container {
      width: min(calc(100% - 40px), var(--max-width));
      margin-inline: auto;
    }

    .skip-link {
      position: fixed;
      z-index: 9999;
      top: 10px;
      left: 10px;
      padding: 12px 18px;
      color: var(--white);
      background: var(--green);
      border-radius: 8px;
      transform: translateY(-150%);
      transition: transform var(--transition);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .eyebrow {
      display: inline-flex;
      gap: 9px;
      align-items: center;
      margin-bottom: 18px;
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 28px;
      height: 3px;
      background: var(--gold);
      border-radius: 999px;
      content: "";
    }

    .section-heading {
      max-width: 720px;
      margin-bottom: 52px;
    }

    .section-heading p {
      max-width: 650px;
      margin-bottom: 0;
      font-size: 1.08rem;
    }

    .btn {
      display: inline-flex;
      min-height: 52px;
      padding: 13px 21px;
      gap: 10px;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 750;
      line-height: 1;
      transition:
        color var(--transition),
        background var(--transition),
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:focus-visible,
    .nav-link:focus-visible,
    .menu-toggle:focus-visible,
    .faq-button:focus-visible,
    .email-reveal:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(197, 155, 60, 0.55);
      outline-offset: 3px;
    }

    .btn-primary {
      color: var(--white);
      background: var(--red);
      box-shadow: 0 12px 26px rgba(181, 31, 46, 0.25);
    }

    .btn-primary:hover {
      background: var(--red-dark);
      box-shadow: 0 16px 32px rgba(181, 31, 46, 0.32);
    }

    .btn-secondary {
      color: var(--green);
      background: rgba(255, 255, 255, 0.74);
      border-color: rgba(18, 63, 49, 0.2);
    }

    .btn-secondary:hover {
      background: var(--white);
      border-color: var(--green);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      transition: transform var(--transition);
    }

    .btn:hover svg {
      transform: translateX(3px);
    }

    .site-header {
      position: fixed;
      z-index: 1000;
      top: 0;
      right: 0;
      left: 0;
      height: var(--header-height);
      transition:
        background var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);
    }

    .site-header.scrolled {
      background: rgba(251, 250, 246, 0.92);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 30px rgba(16, 23, 19, 0.06);
      backdrop-filter: blur(18px);
    }

    .nav-wrap {
      display: flex;
      height: 100%;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: inline-flex;
      gap: 11px;
      align-items: center;
      font-size: 1.3rem;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .logo-mark {
      position: relative;
      width: 31px;
      height: 31px;
      overflow: hidden;
      background: var(--green);
      border-radius: 9px;
      transform: rotate(-3deg);
    }

    .logo-mark::before,
    .logo-mark::after {
      position: absolute;
      height: 6px;
      border-radius: 999px;
      content: "";
      transform: rotate(-34deg);
    }

    .logo-mark::before {
      right: 4px;
      bottom: 8px;
      width: 24px;
      background: var(--gold);
    }

    .logo-mark::after {
      right: 2px;
      bottom: 15px;
      width: 17px;
      background: var(--red);
    }

    .nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-links {
      display: flex;
      margin: 0;
      padding: 0;
      gap: 3px;
      align-items: center;
      list-style: none;
    }

    .nav-link {
      display: block;
      padding: 10px 13px;
      color: #3f4944;
      border-radius: 999px;
      font-size: 0.93rem;
      font-weight: 670;
      transition: color var(--transition), background var(--transition);
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--red);
      background: var(--red-light);
    }

    .header-cta {
      margin-left: 13px;
      min-height: 45px;
      padding: 11px 17px;
      font-size: 0.9rem;
    }

    .menu-toggle {
      display: none;
      width: 45px;
      height: 45px;
      padding: 10px;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
    }

    .menu-lines {
      position: relative;
      width: 22px;
      height: 16px;
    }

    .menu-lines span {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--ink);
      border-radius: 99px;
      transition: transform var(--transition), opacity var(--transition), top var(--transition);
    }

    .menu-lines span:first-child {
      top: 2px;
    }

    .menu-lines span:last-child {
      top: 12px;
    }

    .menu-toggle[aria-expanded="true"] .menu-lines span:first-child {
      top: 7px;
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] .menu-lines span:last-child {
      top: 7px;
      transform: rotate(-45deg);
    }

    .hero {
      display: flex;
      min-height: 820px;
      padding-top: calc(var(--header-height) + 88px);
      padding-bottom: 82px;
      align-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 88% 18%, rgba(181, 31, 46, 0.15), transparent 29%),
        radial-gradient(circle at 8% 88%, rgba(197, 155, 60, 0.22), transparent 31%),
        var(--cream);
    }

    .hero::before {
      position: absolute;
      top: 12%;
      right: -115px;
      width: 380px;
      height: 380px;
      border: 1px solid rgba(18, 63, 49, 0.12);
      border-radius: 50%;
      box-shadow:
        0 0 0 45px rgba(18, 63, 49, 0.025),
        0 0 0 90px rgba(18, 63, 49, 0.018);
      content: "";
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(330px, 0.65fr);
      gap: 54px;
      align-items: center;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
    }

    .hero h1 span {
      position: relative;
      color: var(--red);
      white-space: nowrap;
    }

    .hero h1 span::after {
      position: absolute;
      right: 0;
      bottom: 2px;
      left: 0;
      z-index: -1;
      height: 13px;
      background: var(--gold);
      border-radius: 999px;
      content: "";
      opacity: 0.32;
      transform: rotate(-1deg);
    }

    .hero-lead {
      max-width: 680px;
      margin-bottom: 30px;
      color: #4f5c56;
      font-size: clamp(1.08rem, 2vw, 1.28rem);
    }

    .hero-actions {
      display: flex;
      margin-bottom: 30px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-points {
      display: flex;
      margin: 0;
      padding: 0;
      gap: 12px 22px;
      flex-wrap: wrap;
      list-style: none;
    }

    .hero-points li {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: #47534d;
      font-size: 0.9rem;
      font-weight: 650;
    }

    .hero-points svg {
      width: 17px;
      height: 17px;
      color: var(--green-mid);
    }

    .hero-visual {
      position: relative;
      z-index: 2;
      min-height: 490px;
    }

    .browser-card {
      position: absolute;
      z-index: 2;
      top: 20px;
      right: 0;
      width: min(100%, 420px);
      overflow: hidden;
      background: var(--white);
      border: 1px solid rgba(16, 23, 19, 0.1);
      border-radius: 22px;
      box-shadow: var(--shadow-lg);
      transform: rotate(2.4deg);
      transition: transform 500ms ease;
    }

    .browser-card:hover {
      transform: rotate(0deg) translateY(-5px);
    }

    .browser-top {
      display: flex;
      height: 43px;
      padding: 0 15px;
      gap: 6px;
      align-items: center;
      background: #f2f0eb;
      border-bottom: 1px solid var(--line);
    }

    .browser-dot {
      width: 8px;
      height: 8px;
      background: #d8d4cb;
      border-radius: 50%;
    }

    .browser-dot:first-child {
      background: var(--red);
    }

    .browser-dot:nth-child(2) {
      background: var(--gold);
    }

    .browser-dot:nth-child(3) {
      background: var(--green-mid);
    }

    .mock-site {
      min-height: 395px;
      padding: 28px;
      background:
        linear-gradient(150deg, rgba(18
