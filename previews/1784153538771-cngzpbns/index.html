<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="arc creates bold, polished web experiences designed to build trust and turn attention into bookings.">
  <meta name="theme-color" content="#0b0b0c">
  <meta property="og:title" content="arc — Bold web experiences">
  <meta property="og:description" content="Premium web design focused on trust, clarity, and bookings.">
  <meta property="og:type" content="website">
  <title>arc — Bold Web Experiences</title>
  <style>
    :root {
      --ink: #0b0b0c;
      --ink-soft: #171719;
      --paper: #f2eee7;
      --paper-deep: #e8e1d6;
      --white: #fffdf9;
      --gold: #c79759;
      --gold-light: #e6c995;
      --muted: #aaa59d;
      --line-dark: rgba(255,255,255,.13);
      --line-light: rgba(11,11,12,.14);
      --shadow: 0 30px 80px rgba(0,0,0,.16);
      --radius: 24px;
      --max-width: 1240px;
      --header-height: 82px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: var(--header-height);
    }

    body {
      min-width: 320px;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body.menu-open {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    ::selection {
      color: var(--ink);
      background: var(--gold-light);
    }

    .container {
      width: min(calc(100% - 48px), var(--max-width));
      margin-inline: auto;
    }

    .section {
      position: relative;
      padding: 120px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--gold);
      font-size: .74rem;
      font-weight: 750;
      letter-spacing: .18em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 34px;
      height: 1px;
      content: "";
      background: currentColor;
    }

    .section-heading {
      max-width: 820px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.7rem, 6vw, 5.6rem);
      font-weight: 400;
      letter-spacing: -.055em;
      line-height: .98;
    }

    .section-heading em {
      color: var(--gold);
      font-weight: 400;
    }

    .section-intro {
      max-width: 620px;
      margin-top: 28px;
      color: #5d5953;
      font-size: clamp(1rem, 1.4vw, 1.18rem);
    }

    .skip-link {
      position: fixed;
      z-index: 1000;
      top: 12px;
      left: 12px;
      padding: 12px 16px;
      color: var(--white);
      background: var(--ink);
      border-radius: 8px;
      transform: translateY(-150%);
      transition: transform .2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .site-header {
      position: fixed;
      z-index: 100;
      top: 0;
      right: 0;
      left: 0;
      height: var(--header-height);
      color: var(--white);
      border-bottom: 1px solid transparent;
      transition: background .35s ease, border-color .35s ease, height .35s ease;
    }

    .site-header.scrolled {
      height: 72px;
      border-color: var(--line-dark);
      background: rgba(11,11,12,.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .header-inner {
      display: flex;
      height: 100%;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      position: relative;
      z-index: 102;
      display: inline-flex;
      align-items: center;
      gap: 11px;
      font-size: 1.36rem;
      font-weight: 800;
      letter-spacing: -.06em;
    }

    .brand-mark {
      position: relative;
      width: 29px;
      height: 29px;
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 50%;
    }

    .brand-mark::after {
      position: absolute;
      right: -5px;
      bottom: 2px;
      width: 13px;
      height: 1px;
      content: "";
      background: var(--gold-light);
      transform: rotate(-42deg);
      transform-origin: right;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .nav-link {
      position: relative;
      color: rgba(255,255,255,.72);
      font-size: .79rem;
      font-weight: 650;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: color .25s ease;
    }

    .nav-link::after {
      position: absolute;
      right: 0;
      bottom: -8px;
      left: 0;
      height: 1px;
      content: "";
      background: var(--gold-light);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform .3s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--white);
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .header-cta {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      color: var(--ink);
      background: var(--white);
      border: 1px solid var(--white);
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 750;
      letter-spacing: .07em;
      text-transform: uppercase;
      transition: color .25s ease, background .25s ease, transform .25s ease;
    }

    .header-cta:hover {
      color: var(--white);
      background: transparent;
      transform: translateY(-2px);
    }

    .menu-toggle {
      position: relative;
      z-index: 102;
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line-dark);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
    }

    .menu-toggle span {
      position: absolute;
      left: 12px;
      width: 18px;
      height: 1px;
      background: var(--white);
      transition: transform .25s ease, top .25s ease;
    }

    .menu-toggle span:first-child {
      top: 17px;
    }

    .menu-toggle span:last-child {
      top: 25px;
    }

    .menu-toggle[aria-expanded="true"] span:first-child {
      top: 21px;
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] span:last-child {
      top: 21px;
      transform: rotate(-45deg);
    }

    .mobile-nav {
      position: fixed;
      z-index: 101;
      inset: 0;
      display: none;
      padding: 120px 24px 40px;
      background: rgba(11,11,12,.98);
    }

    .mobile-nav.open {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: fadeIn .25s ease both;
    }

    .mobile-nav-links {
      display: grid;
      gap: 16px;
    }

    .mobile-nav a {
      color: var(--white);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 12vw, 4.5rem);
      line-height: 1.08;
    }

    .mobile-nav small {
      color: var(--muted);
    }

    .hero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      color: var(--white);
      background:
        radial-gradient(circle at 78% 18%, rgba(199,151,89,.25), transparent 24%),
        radial-gradient(circle at 20% 85%, rgba(94,70,42,.18), transparent 30%),
        var(--ink);
    }

    .hero::before {
      position: absolute;
      inset: 0;
      content: "";
      opacity: .24;
      background-image:
        linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .hero-orbit {
      position: absolute;
      top: 8%;
      right: -10%;
      width: min(62vw, 850px);
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 50%;
      animation: slowSpin 45s linear infinite;
    }

    .hero-orbit::before,
    .hero-orbit::after {
      position: absolute;
      content: "";
      border-radius: 50%;
    }

    .hero-orbit::before {
      inset: 14%;
      border: 1px solid rgba(199,151,89,.22);
    }

    .hero-orbit::after {
      top: 9%;
      left: 19%;
      width: 13px;
      height: 13px;
      background: var(--gold-light);
      box-shadow: 0 0 35px rgba(230,201,149,.7);
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      display: grid;
      min-height: 100svh;
      align-items: end;
      padding-top: 150px;
      padding-bottom: 58px;
    }

    .hero-content {
      max-width: 1040px;
    }

    .hero-kicker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: var(--gold-light);
      font-size: .76rem;
      font-weight: 750;
      letter-spacing: .19em;
      text-transform: uppercase;
    }

    .hero-kicker span {
      width: 7px;
      height: 7px;
      background: var(--gold-light);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(230,201,149,.1);
    }

    .hero h1 {
      max-width: 1000px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 10.4vw, 9.7rem);
      font-weight: 400;
      letter-spacing: -.07em;
      line-height: .82;
    }

    .hero h1 em {
      display: block;
      color: var(--gold-light);
      font-weight: 400;
    }

    .hero-bottom {
      display: grid;
      grid-template-columns: minmax(260px, 530px) auto;
      align-items: end;
      justify-content: space-between;
      gap: 42px;
      margin-top: 52px;
    }

    .hero-copy {
      color: rgba(255,255,255,.66);
      font-size: clamp(1rem, 1.5vw, 1.22rem);
    }

    .hero-copy strong {
      color: var(--white);
      font-weight: 600;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 25px;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 750;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: transform .25s ease, background .25s ease, color .25s ease, border-color .25s ease;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .button-primary {
      color: var(--ink);
      background: var(--gold-light);
    }

    .button-primary:hover {
      background: var(--white);
    }

    .button-secondary {
      color: var(--white);
      border-color: rgba(255,255,255,.3);
      background: rgba(255,255,255,.03);
    }

    .button-secondary:hover {
      border-color: var(--white);
      background: rgba(255,255,255,.08);
    }

    .button-arrow {
      font-size: 1.05rem;
      transition: transform .25s ease;
    }

    .button:hover .button-arrow {
      transform: translateX(4px);
    }

    .hero-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-top: 56px;
      padding-top: 22px;
      color: rgba(255,255,255,.43);
      border-top: 1px solid var(--line-dark);
      font-size: .72rem;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .services {
      overflow: hidden;
    }

    .services-header {
      display: grid;
      grid-template-columns: 1.45fr .75fr;
      align-items: end;
      gap: 70px;
      margin-bottom: 70px;
    }

    .services-header .section-intro {
      margin: 0;
    }

    .service-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
    }

    .service-card {
      position: relative;
      min-height: 450px;
      overflow: hidden;
      padding: 42px;
      color: var(--white);
      background: var(--ink-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .service-card::before {
      position: absolute;
      content: "";
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 50%;
    }

    .service-card.primary::before {
      top: -140px;
      right: -120px;
      width: 470px;
      height: 470px;
      box-shadow:
        0 0 0
