<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="siterise creates clean, bold, mobile-friendly websites that help businesses look trusted, explain their services, and generate more calls and bookings.">
  <meta name="theme-color" content="#05070a">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="siterise — Bold websites built to convert">
  <meta property="og:description" content="Premium web design for businesses ready to look more trusted and turn visits into enquiries.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <title>siterise — Bold websites built to convert</title>

  <style>
    :root {
      --black: #05070a;
      --black-soft: #0b0f16;
      --panel: #111722;
      --panel-light: #171e2b;
      --white: #ffffff;
      --off-white: #f4f7fb;
      --muted: #a8b1c2;
      --ink-muted: #5c6677;
      --blue: #1769ff;
      --blue-bright: #3f83ff;
      --blue-pale: #e8f0ff;
      --line-dark: rgba(255, 255, 255, 0.12);
      --line-light: #dce3ee;
      --success: #62dc9b;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 24px 70px rgba(4, 15, 35, 0.16);
      --max-width: 1180px;
      --header-height: 80px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-height) + 20px);
    }

    body {
      margin: 0;
      color: var(--black);
      background: var(--white);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body.menu-open {
      overflow: hidden;
    }

    ::selection {
      color: var(--white);
      background: var(--blue);
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1,
    h2,
    h3 {
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p:last-child {
      margin-bottom: 0;
    }

    .container {
      width: min(calc(100% - 40px), var(--max-width));
      margin-inline: auto;
    }

    .section {
      padding: 120px 0;
      position: relative;
    }

    .section-dark {
      color: var(--white);
      background: var(--black);
    }

    .section-soft {
      background: var(--off-white);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--blue);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .section-label::before {
      width: 28px;
      height: 2px;
      content: "";
      background: currentColor;
    }

    .section-dark .section-label {
      color: #71a2ff;
    }

    .section-heading {
      max-width: 820px;
      margin-bottom: 64px;
    }

    .section-heading h2 {
      max-width: 760px;
      margin-bottom: 22px;
      font-size: clamp(2.3rem, 5vw, 4.7rem);
    }

    .section-heading p {
      max-width: 650px;
      margin-bottom: 0;
      color: var(--ink-muted);
      font-size: 1.12rem;
    }

    .section-dark .section-heading p {
      color: var(--muted);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border: 1px solid var(--line-dark);
      border-radius: 999px;
      color: #d9e4f8;
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue-bright);
      box-shadow: 0 0 0 5px rgba(63, 131, 255, 0.15);
    }

    .btn {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 750;
      line-height: 1;
      transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:focus-visible,
    a:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(63, 131, 255, 0.42);
      outline-offset: 3px;
    }

    .btn-primary {
      color: var(--white);
      background: var(--blue);
      box-shadow: 0 14px 35px rgba(23, 105, 255, 0.28);
    }

    .btn-primary:hover {
      background: var(--blue-bright);
      box-shadow: 0 17px 40px rgba(23, 105, 255, 0.36);
    }

    .btn-secondary {
      color: var(--white);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-dark {
      color: var(--white);
      background: var(--black);
    }

    .btn-dark:hover {
      background: var(--panel-light);
    }

    .arrow {
      width: 18px;
      height: 18px;
      transition: transform 180ms ease;
    }

    .btn:hover .arrow {
      transform: translateX(3px);
    }

    .site-header {
      height: var(--header-height);
      position: fixed;
      z-index: 1000;
      top: 0;
      right: 0;
      left: 0;
      border-bottom: 1px solid transparent;
      transition: height 220ms ease, border-color 220ms ease, background-color 220ms ease, backdrop-filter 220ms ease;
    }

    .site-header.scrolled {
      height: 68px;
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(5, 7, 10, 0.88);
      backdrop-filter: blur(18px);
    }

    .nav-wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-size: 1.35rem;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .logo-mark {
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: var(--blue);
      box-shadow: 0 8px 20px rgba(23, 105, 255, 0.3);
    }

    .logo-mark::before,
    .logo-mark::after {
      width: 13px;
      height: 4px;
      position: absolute;
      content: "";
      border-radius: 3px;
      background: var(--white);
      transform: rotate(-35deg);
    }

    .logo-mark::before {
      top: 8px;
      left: 5px;
    }

    .logo-mark::after {
      right: 5px;
      bottom: 8px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .nav-links a {
      position: relative;
      color: #c7cfdd;
      font-size: 0.92rem;
      font-weight: 650;
      transition: color 180ms ease;
    }

    .nav-links a:not(.nav-cta)::after {
      width: 0;
      height: 2px;
      position: absolute;
      right: 0;
      bottom: -8px;
      left: 0;
      margin: auto;
      content: "";
      background: var(--blue-bright);
      transition: width 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--white);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .nav-links .nav-cta {
      padding: 12px 18px;
      border-radius: 999px;
      color: var(--white);
      background: var(--blue);
    }

    .nav-links .nav-cta:hover {
      background: var(--blue-bright);
    }

    .menu-toggle {
      width: 44px;
      height: 44px;
      display: none;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid var(--line-dark);
      border-radius: 12px;
      color: var(--white);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .menu-toggle span,
    .menu-toggle::before,
    .menu-toggle::after {
      width: 19px;
      height: 2px;
      position: absolute;
      content: "";
      border-radius: 3px;
      background: currentColor;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .menu-toggle::before {
      transform: translateY(-6px);
    }

    .menu-toggle::after {
      transform: translateY(6px);
    }

    .menu-toggle[aria-expanded="true"] span {
      opacity: 0;
    }

    .menu-toggle[aria-expanded="true"]::before {
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"]::after {
      transform: rotate(-45deg);
    }

    .hero {
      min-height: 860px;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 150px 0 100px;
      color: var(--white);
      background:
        radial-gradient(circle at 78% 22%, rgba(23, 105, 255, 0.2), transparent 29%),
        radial-gradient(circle at 15% 80%, rgba(23, 105, 255, 0.1), transparent 30%),
        var(--black);
    }

    .hero::before {
      position: absolute;
      inset: 0;
      content: "";
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    .hero::after {
      width: 460px;
      height: 460px;
      position: absolute;
      top: 8%;
      right: -250px;
      content: "";
      border: 1px solid rgba(63, 131, 255, 0.28);
      border-radius: 50%;
      box-shadow:
        0 0 0 80px rgba(63, 131, 255, 0.035),
        0 0 0 160px rgba(63, 131, 255, 0.025);
    }

    .hero-grid {
      display: grid;
      align-items: center;
      position: relative;
      z-index: 2;
      grid-template-columns: minmax(0, 1.08fr) minmax(370px, 0.92fr);
      gap: 80px;
    }

    .hero-copy h1 {
      max-width: 760px;
      margin: 24px 0;
      font-size: clamp(3.3rem, 7vw, 6.75rem);
      letter-spacing: -0.07em;
    }

    .hero-copy h1 span {
      color: var(--blue-bright);
    }

    .hero-copy > p {
      max-width: 630px;
      margin-bottom: 34px;
      color: #b8c2d3;
      font-size: clamp(1.05rem, 2vw, 1.24rem);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .hero-notes {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      margin-top: 34px;
      color: #96a1b3;
      font-size: 0.86rem;
    }

    .hero-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .check {
      width: 18px;
      height: 18px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 50%;
      color: var(--blue-bright);
      background: rgba(63, 131, 255, 0.14);
    }

    .check svg {
      width: 11px;
      height: 11px;
    }

    .hero-visual {
      min-height: 500px;
      position: relative;
    }

    .browser-card {
      width: min(100%, 470px);
      position: absolute;
      top: 35px;
      right: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      background: #eef3fa;
      box-shadow: 0 36px 90px rgba(0, 0, 0, 0.42);
      transform: rotate(2deg);
    }

    .browser-top {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 14px;
      background: #161c26;
    }

    .browser-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #687286;
    }

    .browser-url {
      width: 52%;
      height: 8px;
      margin-left: 10px;
      border-radius: 9px;
      background: #303848;
    }

    .mock-site {
      min-height: 390px;
      padding:
