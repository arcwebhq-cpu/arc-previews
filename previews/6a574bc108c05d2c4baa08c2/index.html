  <style>
    :root {
      --black: #05070a;
      --black-soft: #0b0f16;
      --navy: #0e1728;
      --blue: #2476ff;
      --blue-light: #6fa3ff;
      --blue-pale: #eaf2ff;
      --white: #ffffff;
      --off-white: #f5f8fc;
      --text: #111827;
      --muted: #5f6b7a;

      --radius-sm: 14px;

      --header-height: 78px;

    * {

    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-height) + 20px);
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--white);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.menu-open {
      overflow: hidden;
    }

    ::selection {
      color: var(--white);
      background: var(--blue);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1,
    h2,
    h3 {
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p {
      color: var(--muted);
    }

    section {
      position: relative;
    }

    .container {
      width: min(calc(100% - 40px), var(--container));
      margin-inline: auto;
    }

    .section {
      padding: 112px 0;
    }

    .section-dark {
      color: var(--white);
      background:
        radial-gradient(circle at 85% 15%, rgba(36, 118, 255, 0.20), transparent 30%),
        var(--black);
    }

    .section-dark p {
      color: #aab5c6;
    }

    .section-light {
      background: var(--off-white);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 20px;
      color: var(--blue);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 24px;
      height: 2px;
      content: "";
      background: currentColor;
    }

    .section-dark .eyebrow {
      color: var(--blue-light);
    }

    .section-heading {
      max-width: 760px;
      margin-bottom: 58px;
    }

      max-width: 720px;
      margin-bottom: 18px;
      font-size: clamp(2.25rem, 5vw, 4.2rem);
    }

    .section-heading p {
      max-width: 640px;
      margin-bottom: 0;
      font-size: 1.08rem;
    }

    .skip-link {
      position: fixed;
      z-index: 2000;
      top: 10px;
      left: 10px;
      padding: 10px 16px;
      color: var(--white);
      background: var(--blue);
      border-radius: 8px;
      transform: translateY(-160%);
      transition: transform 0.2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);

      border-color: var(--dark-line);

      bottom: 8px;

      position: absolute;
      right: 0;

      left: 0;
      height: 2px;
      content: "";

      transform: scaleX(0);
      transition: transform 0.2s ease;

    .nav-link:hover,
    .nav-link.active {

    .button:hover {
      background: #1267f6;
      box-shadow: 0 16px 34px rgba(36, 118, 255, 0.3);
      transform: translateY(-2px);

    .menu-open .menu-button span:last-child {

    }
