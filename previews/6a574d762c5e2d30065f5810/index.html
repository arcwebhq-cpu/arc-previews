<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="siterise creates modern, bold websites designed to help businesses look trusted and generate more calls.">
  <meta name="theme-color" content="#0b0d12">
  <meta name="robots" content="index, follow">
  <title>siterise — Modern Websites Built to Earn Trust</title>

  <style>
    :root {
      --ink: #0b0d12;
      --ink-soft: #171a22;
      --paper: #f5f2e9;
      --white: #ffffff;
      --lime: #c8ff3d;
      --lime-dark: #99cb1d;
      --orange: #ff6542;
      --muted: #686b73;
      --line: rgba(11, 13, 18, 0.14);
      --line-dark: rgba(255, 255, 255, 0.14);
      --shadow: 0 24px 80px rgba(11, 13, 18, 0.14);
      --radius: 24px;
      --container: 1180px;
      --header-height: 84px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: calc(var(--header-height) + 20px);
    }

    body {
      min-width: 320px;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.menu-open {
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    ::selection {
      background: var(--lime);
      color: var(--ink);
    }

    .container {
      width: min(calc(100% - 40px), var(--container));
      margin-inline: auto;
    }

    .section {
      padding: 120px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--orange);
      content: "";
    }

    .section-heading {
      max-width: 800px;
      font-size: clamp(2.6rem, 6vw, 5.6rem);
      font-weight: 900;
      letter-spacing: -0.065em;
      line-height: 0.94;
    }

    .section-heading span {
      color: var(--muted);
    }

    .section-intro {
      max-width: 650px;
      margin-top: 28px;
      color: var(--muted);
      font-size: clamp(1rem, 1.5vw, 1.18rem);
    }

    .button {
      display: inline-flex;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 24px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: var(--lime);
      color: var(--ink);
      cursor: pointer;
      font-weight: 850;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .button:hover {
      background: var(--white);
      transform: translateY(-3px);
    }

    .button:focus-visible,
    .nav-link:focus-visible,
    .menu-toggle:focus-visible,
    .email-reveal:focus-visible {
      outline: 3px solid var(--orange);
      outline-offset: 4px;
    }

    .button-dark {
      background: var(--ink);
      color: var(--white);
    }

    .button-dark:hover {
      background: var(--orange);
      color: var(--ink);
    }

    .button-outline {
      border-color: rgba(255, 255, 255, 0.3);
      background: transparent;
      color: var(--white);
    }

    .button-outline:hover {
      border-color: var(--white);
      background: var(--white);
      color: var(--ink);
    }

    .button svg {
      width: 18px;
      height: 18px;
      transition: transform 180ms ease;
    }

    .button:hover svg {
      transform: translate(3px, -3px);
    }

    .site-header {
      position: fixed;
      z-index: 1000;
      top: 0;
      right: 0;
      left: 0;
      height: var(--header-height);
      border-bottom: 1px solid transparent;
      transition: background 200ms ease, border-color 200ms ease, backdrop-filter 200ms ease;
    }

    .site-header.scrolled {
      border-color: var(--line);
      background: rgba(245, 242, 233, 0.88);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      display: flex;
      height: 100%;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .logo {
      position: relative;
      z-index: 1002;
      display: inline-flex;
      align-items: center;
      gap: 11px;
      font-size: 1.25rem;
      font-weight: 950;
      letter-spacing: -0.05em;
    }

    .logo-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 10px;
      background: var(--ink);
      color: var(--lime);
      font-size: 1.15rem;
      transform: rotate(-5deg);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .nav-list {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-link {
      position: relative;
      font-size: 0.92rem;
      font-weight: 750;
    }

    .nav-link::after {
      position: absolute;
      right: 0;
      bottom: -7px;
      left: 0;
      height: 2px;
      background: var(--ink);
      content: "";
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 180ms ease;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .header-cta {
      min-height: 44px;
      padding-inline: 19px;
      background: var(--ink);
      color: var(--white);
      font-size: 0.9rem;
    }

    .menu-toggle {
      position: relative;
      z-index: 1002;
      display: none;
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
    }

    .menu-toggle span {
      position: absolute;
      left: 12px;
      width: 20px;
      height: 2px;
      background: var(--ink);
      transition: transform 200ms ease, top 200ms ease;
    }

    .menu-toggle span:first-child {
      top: 18px;
    }

    .menu-toggle span:last-child {
      top: 25px;
    }

    .menu-toggle[aria-expanded="true"] span:first-child {
      top: 22px;
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] span:last-child {
      top: 22px;
      transform: rotate(-45deg);
    }

    .hero {
      position: relative;
      display: flex;
      min-height: 100svh;
      align-items: flex-end;
      overflow: hidden;
      padding: calc(var(--header-height) + 80px) 0 80px;
    }

    .hero::before {
      position: absolute;
      top: 11%;
      right: -9%;
      width: min(52vw, 720px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, var(--lime) 0 12%, transparent 12.5%),
        repeating-radial-gradient(circle at center, transparent 0 26px, rgba(11, 13, 18, 0.08) 27px 29px),
        linear-gradient(145deg, rgba(255, 101, 66, 0.92), rgba(200, 255, 61, 0.75));
      content: "";
      filter: saturate(115%);
      transform: rotate(-8deg);
    }

    .hero::after {
      position: absolute;
      top: 24%;
      right: 25%;
      width: 150px;
      height: 150px;
      border: 2px solid var(--ink);
      border-radius: 24px;
      content: "";
      transform: rotate(18deg);
    }

    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      align-items: end;
      gap: 70px;
    }

    .hero-kicker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-size: 0.8rem;
      font-weight: 850;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hero-kicker i {
      width: 38px;
      height: 2px;
      background: var(--ink);
    }

    h1 {
      max-width: 900px;
      font-size: clamp(4rem, 10vw, 9.2rem);
      font-weight: 950;
      letter-spacing: -0.085em;
      line-height: 0.81;
    }

    h1 .accent {
      display: inline-block;
      color: var(--orange);
      font-style: italic;
      transform: translateX(0.03em);
    }

    .hero-copy {
      padding-bottom: 8px;
    }

    .hero-copy p {
      margin-bottom: 26px;
      color: #353840;
      font-size: 1.08rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-note {
      display: flex;
      grid-column: 1 / -1;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 42px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .scroll-cue {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scroll-cue span {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
    }

    .services {
      position: relative;
      overflow: hidden;
      background: var(--ink);
      color: var(--white);
    }

    .services .eyebrow,
    .services .section-intro {
      color: rgba(255, 255, 255, 0.62);
    }

    .services .section-heading span {
      color: rgba(255, 255, 255, 0.3);
    }

    .services-grid {
      display: grid;
      margin-top: 72px;
      border-top: 1px solid var(--line-dark);
    }

    .service-card {
      display: grid;
      grid-template-columns: 80px 1fr 1fr;
      gap: 30px;
      padding: 42px 0;
      border-bottom: 1px solid var(--line-dark);
      transition: padding 200ms ease, background 200ms ease;
    }

    .service-card:hover {
      padding-right: 24px;
      padding-left: 24px;
      background: rgba(255, 255, 255, 0.045);
    }

    .service-number {
      color: var(--lime);
      font-size: 0.82rem;
      font-weight: 850;
      letter-spacing: 0.12em;
    }

    .service-card h3 {
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      letter-spacing: -0.045em;
      line-height: 1;
    }

    .service-detail p {
      max-width: 490px;
      color: rgba(255, 255, 255, 0.62);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
      list-style: none;
    }

    .tag-list li {
      padding: 7px 12px;
      border: 1px solid var(--line-dark);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .why-grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 90px;
      align-items: start;
    }

    .why-sticky {
      position: sticky;
      top: 130px;
    }

    .why-cards {
      display: grid;
      gap: 18px;
    }

    .why-card {
      position: relative;
      overflow: hidden;
      min-height: 250px;
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.5);
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .why-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-5px);
    }

    .why-card::after {
      position: absolute;
      right: -55px;
      bottom: -60px;
      width: 170px;
      height: 170px;
      border: 22px solid rgba(11, 13, 18, 0.045);
      border-radius: 50%;
      content: "";
    }

    .why-card:nth-child(2) {
      background: var(--lime);
    }

    .why-card:nth-child(3) {
      background: var(--orange);
    }

    .why-icon {
      display: grid;
      width: 50px;
      height: 50px;
      margin-bottom: 46px;
      place-items: center;
      border-radius: 14px;
      background: var(--ink);
      color: var(--white);
      font-weight: 900;
    }

    .why-card h3 {
      margin-bottom: 10px;
      font-size: 1.45rem;
      letter-spacing: -0.035em;
    }

    .why-card p {
      position: relative;
      z-index: 1;
      max-width: 500px;
      color: #464950;
    }

    .work {
      background: #e7e1d5;
    }

    .work-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 40px;
    }

    .work-disclaimer {
      max-width: 315px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 70px;
    }

    .work-card {
      overflow: hidden;
      border: 1px solid rgba(11, 13, 18, 0.1);
      border-radius: var(--radius);
      background: var(--paper);
    }

    .work-card:first-child {
      grid-column: 1
